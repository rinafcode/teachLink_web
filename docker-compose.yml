version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: teachlink-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - teachlink-network
    volumes:
      - ./logs:/app/logs

  # Development-specific overrides using a separate compose file
  # Run with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

networks:
  teachlink-network:
    driver: bridge

volumes:
  logs:
