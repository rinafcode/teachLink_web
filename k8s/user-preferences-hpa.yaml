apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: teachlink-user-preferences-hpa
  namespace: production
  labels:
    app: teachlink
    component: user-preferences
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: teachlink-user-preferences
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
