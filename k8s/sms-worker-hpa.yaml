apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: teachlink-sms-worker-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: teachlink-sms-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: External
      external:
        metric:
          name: sms_queue_length
        target:
          type: AverageValue
          averageValue: 500
