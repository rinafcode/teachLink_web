apiVersion: apps/v1
kind: Deployment
metadata:
  name: teachlink-profile
  namespace: production
  labels:
    app: teachlink
    component: profile
spec:
  replicas: 2
  selector:
    matchLabels:
      app: teachlink
      component: profile
  template:
    metadata:
      labels:
        app: teachlink
        component: profile
    spec:
      containers:
        - name: profile
          image: rinafcode/teachlink-profile:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: 'production'
            - name: PORT
              value: '3000'
