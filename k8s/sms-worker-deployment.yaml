apiVersion: apps/v1
kind: Deployment
metadata:
  name: teachlink-sms-worker
  namespace: production
  labels:
    app: teachlink
    component: sms-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: teachlink
      component: sms-worker
  template:
    metadata:
      labels:
        app: teachlink
        component: sms-worker
    spec:
      containers:
        - name: sms-worker
          image: rinafcode/teachlink-sms-worker:latest
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: 'production'
            - name: WORKER_TYPE
              value: 'sms'
