apiVersion: apps/v1
kind: Deployment
metadata:
  name: teachlink-user-preferences
  namespace: production
  labels:
    app: teachlink
    component: user-preferences
spec:
  replicas: 2
  selector:
    matchLabels:
      app: teachlink
      component: user-preferences
  template:
    metadata:
      labels:
        app: teachlink
        component: user-preferences
    spec:
      containers:
      - name: user-preferences
        image: rinafcode/teachlink-user-preferences:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
